<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sismik İzleme Pro</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    
    <div class="top-bar glass-effect">
        <div class="live-indicator"><span class="dot"></span> CANLI VERİ</div>
        <div id="last-update">--:--:--</div>
    </div>

    <div id="earthquake-list-container" class="glass-effect">
        <div class="list-header"><span>⚠️ Son Aktivite</span> <small id="list-count">0</small></div>
        <div id="earthquake-list" class="style-scroll"></div>
    </div>

    <div class="bottom-panel glass-effect">
        <div class="filter-group">
            <span class="label">Büyüklük</span>
            <div class="btn-row">
                <button onclick="changeMag(0)" class="mag-btn btn-active">Hepsi</button>
                <button onclick="changeMag(4.5)" class="mag-btn">4.5+</button>
            </div>
        </div>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="script.js"></script>
</body>
</html>

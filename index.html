<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | Akıcı</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .legend {
            background: rgba(15, 15, 15, 0.85);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            position: absolute;
            bottom: 30px;
            right: 20px;
            font-family: sans-serif;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        .legend h4 { margin: 0 0 8px 0; color: #ff9900; font-size: 13px; }
        .legend div { display: flex; align-items: center; margin-bottom: 4px; font-size: 11px; }
        .legend span { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="legend">
    <h4>Sismik Akış</h4>
    <div><span style="background: #00ff00;"></span> < 3.0</div>
    <div><span style="background: #ffff00;"></span> 3.0 - 5.0</div>
    <div><span style="background: #ff0000;"></span> > 5.0</div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZGxyemtuIiwiYSI6ImNtbWY2ZG5pNDA0cmwycnNodm1jdTN3cmQifQ.Sf5rAPwn1JZfwpDF_blj8Q';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [35, 39],
        zoom: 1.8,
        projection: 'globe'
    });

    let userInteracting = false;
    const rotationSpeed = 0.8; // Dönüş hızı (Artırıldı)

    map.on('style.load', () => {
        map.setFog({
            'color': 'rgb(15, 20, 30)',
            'high-color': 'rgb(30, 60, 150)',
            'space-color': 'rgb(0, 0, 0)',
            'star-intensity': 0.4
        });
    });

    function rotateGlobe() {
        if (!userInteracting && map.getZoom() < 5) {
            const center = map.getCenter();
            center.lng -= rotationSpeed;
            map.easeTo({ center, duration: 1000, easing: (t) => t });
        }
    }

    // Etkileşim Yönetimi
    map.on('mousedown', () => { userInteracting = true; });
    map.on('touchstart', () => { userInteracting = true; });
    map.on('mouseup', () => { userInteracting = false; rotateGlobe(); });
    map.on('touchend', () => { userInteracting = false; rotateGlobe(); });
    map.on('moveend', () => { rotateGlobe(); });

    async function updateQuakes() {
        try {
            const res = await fetch('https://api.orhanaydogdu.com.tr/deprem/kandilli/live');
            const data = await res.json();
            const geojson = {
                type: 'FeatureCollection',
                features: data.result.map(d => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [parseFloat(d.lng), parseFloat(d.lat)] },
                    properties: { mag: d.mag, place: d.title, date: d.date }
                }))
            };

            if (map.getSource('quakes')) {
                map.getSource('quakes').setData(geojson);
            } else {
                map.addSource('quakes', { type: 'geojson', data: geojson });
                map.addLayer({
                    id: 'quakes-viz',
                    type: 'circle',
                    source: 'quakes',
                    paint: {
                        'circle-radius': ['interpolate', ['linear'], ['get', 'mag'], 2, 5, 7, 30],
                        'circle-color': ['interpolate', ['linear'], ['get', 'mag'], 2, '#00ff00', 4, '#ffff00', 6, '#ff0000'],
                        'circle-opacity': 0.6,
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#fff'
                    }
                });
            }
        } catch (e) { console.error(e); }
    }

    map.on('load', () => {
        updateQuakes();
        rotateGlobe();
        setInterval(updateQuakes, 60000);
    });

    map.on('click', 'quakes-viz', (e) => {
        const p = e.features[0].properties;
        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.mag}</b><br>${p.place}<br><small>${p.date}</small>`)
            .addTo(map);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | Canlı</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .legend { background: rgba(0,0,0,0.85); color: #fff; padding: 15px; border-radius: 10px; position: absolute; bottom: 40px; right: 20px; font-family: sans-serif; border: 1px solid #444; z-index: 10; }
        .legend h4 { margin: 0 0 10px 0; color: #ff9900; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="legend">
    <h4>Canlı Deprem Takibi</h4>
    <div><span style="color:#00ff00">●</span> < 3.0</div>
    <div><span style="color:#ffff00">●</span> 3.0 - 5.0</div>
    <div><span style="color:#ff0000">●</span> > 5.0</div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZGxyemtuIiwiYSI6ImNtbWY2ZG5pNDA0cmwycnNodm1jdTN3cmQifQ.Sf5rAPwn1JZfwpDF_blj8Q';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [35.2433, 38.9637],
        zoom: 2, // Küre görünümü için biraz uzaklaştırdım
        projection: 'globe' // İŞTE BURASI DÜNYAYI KÜRE YAPAR
    });

    map.on('style.load', () => {
        map.setFog({
            'color': 'rgb(186, 210, 235)', // Atmosfer rengi
            'high-color': 'rgb(36, 92, 223)', // Uzay rengi
            'horizon-blend': 0.02
        });
    });

    async function updateQuakes() {
        try {
            const res = await fetch('https://api.orhanaydogdu.com.tr/deprem/kandilli/live');
            const data = await res.json();
            const geojson = {
                type: 'FeatureCollection',
                features: data.result.map(d => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [parseFloat(d.lng), parseFloat(d.lat)] },
                    properties: { mag: d.mag, place: d.title, date: d.date }
                }))
            };

            if (map.getSource('quakes')) {
                map.getSource('quakes').setData(geojson);
            } else {
                map.addSource('quakes', { type: 'geojson', data: geojson });
                map.addLayer({
                    id: 'quakes-layer',
                    type: 'circle',
                    source: 'quakes',
                    paint: {
                        'circle-radius': ['interpolate', ['linear'], ['get', 'mag'], 2, 4, 7, 20],
                        'circle-color': ['interpolate', ['linear'], ['get', 'mag'], 2, '#00ff00', 4, '#ffff00', 6, '#ff0000'],
                        'circle-opacity': 0.8,
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#fff'
                    }
                });
            }
        } catch (err) {
            console.error("Veri alınamadı:", err);
        }
    }

    map.on('load', () => {
        updateQuakes();
        setInterval(updateQuakes, 30000);
    });

    map.on('click', 'quakes-layer', (e) => {
        const p = e.features[0].properties;
        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<b>${p.mag}</b> - ${p.place}<br><small>${p.date}</small>`)
            .addTo(map);
    });
</script>
</body>
</html>

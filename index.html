<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sismik Dashboard | Canlı Takip</title>
    
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css' rel='stylesheet' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js'></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="live-indicator">
        <span class="pulse-dot"></span>
        <span class="live-text">CANLI SİSMİK VERİ AKIŞI</span>
    </div>

    <div id="map"></div>

    <div class="control-panel">
        <div class="panel-header">
            <div id="last-update">Senkronize Ediliyor...</div>
            <div class="stat-container">
                <span class="stat-badge tag-emsc" title="EMSC Kaynaklı">E: 0</span>
                <span class="stat-badge tag-usgs" title="USGS Kaynaklı">U: 0</span>
                <span class="stat-badge tag-gfz" title="GFZ Kaynaklı">G: 0</span>
            </div>
        </div>
        
        <div class="filter-group">
            <h4>Büyüklük (Mw)</h4>
            <div class="btn-grid">
                <button class="mag-btn btn-active" onclick="EarthquakeApp.changeMag(0, event)">Hepsi</button>
                <button class="mag-btn" onclick="EarthquakeApp.changeMag(4.5, event)">4.5+</button>
                <button class="mag-btn" onclick="EarthquakeApp.changeMag(6.0, event)">6.0+</button>
            </div>
        </div>

        <div class="filter-group">
            <h4>Zaman Aralığı</h4>
            <div class="btn-grid">
                <button class="time-btn" onclick="EarthquakeApp.changeTime('hour', event)">1 Saat</button>
                <button class="time-btn btn-active" onclick="EarthquakeApp.changeTime('day', event)">24 Saat</button>
                <button class="time-btn" onclick="EarthquakeApp.changeTime('week', event)">7 Gün</button>
            </div>
        </div>

        <div class="action-group">
            <button id="rotation-btn" class="btn-active" onclick="EarthquakeApp.toggleRotation()">🌎 Durdur</button>
            <button onclick="EarthquakeApp.toggleTheme()">🌓 Tema</button>
        </div>

        <div class="sidebar-list-container">
            <div id="list-count">Depremler</div>
            <div id="earthquake-list"></div>
        </div>
    </div>

    <div id="loader" style="display:none;">
        <span class="loader-text">Sismik Veriler Alınıyor...</span>
    </div>

    <script src="script.js"></script>
</body>
</html>

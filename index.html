<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | Kandilli & USGS</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="control-panel">
        <button id="spin-btn" class="btn-toggle btn-active">Otomatik Dönüş: AÇIK</button>
    </div>

    <div id="map"></div>

    <div class="legend">
        <h4>Sismik Veri Akışı</h4>
        <div><span style="background: #ff4d4d;"></span> Kandilli (TR)</div>
        <div><span style="background: #ffff00;"></span> USGS (Global)</div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
        <div style="font-size: 10px; opacity: 0.6;">Son 24 Saatlik Veriler</div>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    
    <script src="script.js"></script>

</body>
</html>

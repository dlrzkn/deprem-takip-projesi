<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | USGS Global</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel">
        <button id="spin-btn" class="btn-toggle btn-active">Otomatik Dönüş: AÇIK</button>
    </div>
    <div id="map"></div>
    <div class="legend">
        <h4>Sismik Şiddet (24s)</h4>
        <div><span style="background: #2ecc71;"></span> M < 2.5 (Hissedilmez)</div>
        <div><span style="background: #f1c40f;"></span> M 2.5 - 4.5 (Orta)</div>
        <div><span style="background: #e67e22;"></span> M 4.5 - 6.0 (Güçlü)</div>
        <div><span style="background: #e74c3c;"></span> M 6.0 - 8.0 (Şiddetli)</div>
        <div><span style="background: #8e44ad;"></span> M > 8.0 (Mega)</div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
        <div style="font-size: 10px; opacity: 0.6;">Kaynak: USGS</div>
    </div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <script src="script.js" defer></script>
</body>
</html>

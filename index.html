<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | USGS Global</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel">
        <button id="spin-btn" class="btn-toggle btn-active">Otomatik Dönüş: AÇIK</button>
    </div>
    <div id="map"></div>
    <div class="legend">
        <h4>Mw (24s)</h4>
                <div><span style="background: #2ecc71;"></span> M < 3.0 (Mikro)</div>
        <div><span style="background: #f1c40f;"></span> M 3.0 - 3.9 (Küçük)</div>
        <div><span style="background: #e67e22;"></span> M 4.0 - 4.9 (Hafif)</div>
        <div><span style="background: #e74c3c;"></span> M 5.0 - 5.9 (Orta)</div>
        <div><span style="background: #c0392b;"></span> M 6.0 - 6.9 (Güçlü)</div>
        <div><span style="background: #96281b;"></span> M 7.0 - 7.9 (Büyük)</div>
        <div><span style="background: #8e44ad;"></span> M > 8.0 (Mega)</div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
        <div style="font-size: 10px; opacity: 0.6;">Kaynak: USGS</div>
    </div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <script src="script.js" defer></script>
</body>
</html>

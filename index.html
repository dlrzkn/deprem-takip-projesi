<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="control-panel">
        <button id="spin-btn" class="btn-toggle btn-active">Otomatik Dönüş: AÇIK</button>
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <button class="btn-toggle" onclick="filterMag(0)">Hepsi</button>
            <button class="btn-toggle" onclick="filterMag(4.5)">M 4.5+</button>
            <button class="btn-toggle" onclick="filterMag(6.0)">M 6.0+</button>
        </div>
    </div>

    <div id="map"></div>
    <div class="legend">
        <h4>Sismik Şiddet</h4>
        <div><span style="background: #2ecc71;"></span> M < 2.5</div>
        <div><span style="background: #f1c40f;"></span> M 2.5 - 4.5</div>
        <div><span style="background: #e67e22;"></span> M 4.5 - 6.0</div>
        <div><span style="background: #e74c3c;"></span> M 6.0 - 8.0</div>
        <div><span style="background: #8e44ad;"></span> M > 8.0</div>
    </div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <script src="script.js" defer></script>
</body>
</html>

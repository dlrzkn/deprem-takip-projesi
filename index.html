<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Sismik İzleme Platformu | Pro</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Şık ve şeffaf lejant */
        .legend {
            background: rgba(15, 15, 15, 0.8);
            color: #fff;
            padding: 15px;
            border-radius: 15px;
            position: absolute;
            bottom: 40px;
            right: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        .legend h4 { margin: 0 0 10px 0; color: #ff9900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .legend div { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; }
        .legend span { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 5px currentColor; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="legend">
    <h4>Sismik Veri Akışı</h4>
    <div><span style="background: #00ff00; color: #00ff00;"></span> < 3.0 Hafif</div>
    <div><span style="background: #ffff00; color: #ffff00;"></span> 3.0 - 5.0 Orta</div>
    <div><span style="background: #ff0000; color: #ff0000;"></span> > 5.0 Şiddetli</div>
    <div style="font-size:10px; margin-top:10px; opacity:0.5; border-top: 1px solid #333; pt: 5px;">
        Veri: Kandilli Rasathanesi<br>Mod: Akıllı Küre (3D)
    </div>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiZGxyemtuIiwiYSI6ImNtbWY2ZG5pNDA0cmwycnNodm1jdTN3cmQifQ.Sf5rAPwn1JZfwpDF_blj8Q';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [35.2433, 38.9637],
        zoom: 2,
        projection: 'globe'
    });

    let userInteracting = false;
    let spinEnabled = true;

    map.on('style.load', () => {
        map.setFog({
            'color': 'rgb(15, 20, 30)',
            'high-color': 'rgb(30, 60, 150)',
            'horizon-blend': 0.015,
            'space-color': 'rgb(0, 0, 0)',
            'star-intensity': 0.5
        });
    });

    // Akıllı Dönüş Fonksiyonu
    function rotateGlobe() {
        const zoom = map.getZoom();
        if (spinEnabled && !userInteracting && zoom < 5) {
            let center = map.getCenter();
            center.lng -= 0.15; // Dönüş hızı
            map.easeTo({ center, duration: 1000, easing: (t) => t });
        }
    }

    // Etkileşim Kontrolleri (Tablet ve Mouse Uyumu)
    map.on('mousedown', () => { userInteracting = true; });
    map.on('touchstart', () => { userInteracting = true; });
    map.on('mouseup', () => { userInteracting = false; });
    map.on('touchend', () => { userInteracting = false; });
    map.on('moveend', () => { rotateGlobe(); });

    async function updateQuakes() {
        try {
            const res = await fetch('https://api.orhanaydogdu.com.tr/deprem/kandilli/live');
            const data = await res.json();
            const geojson = {
                type: 'FeatureCollection',
                features: data.result.map(d => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [parseFloat(d.lng), parseFloat(d.lat)] },
                    properties: { mag: d.mag, place: d.title, date: d.date, depth: d.depth }
                }))
            };

            if (map.getSource('quakes')) {
                map.getSource('quakes').setData(geojson);
            } else {
                map.addSource('quakes', { type: 'geojson', data: geojson });
                
                // Arka Plan Nabız Efekti
                map.addLayer({
                    id: 'quakes-pulse',
                    type: 'circle',
                    source: 'quakes',
                    paint: {
                        'circle-radius': ['interpolate', ['linear'], ['get', 'mag'], 2, 10, 7, 50],
                        'circle-color': ['interpolate', ['linear'], ['get', 'mag'], 2, '#00ff00', 4, '#ffff00', 6, '#ff0000'],
                        'circle-opacity': 0.15,
                        'circle-stroke-width': 1.5,
                        'circle-stroke-color': ['interpolate', ['linear'], ['get', 'mag'], 2, '#00ff00', 4, '#ffff00', 6, '#ff0000']
                    }
                });

                // Merkez Nokta
                map.addLayer({
                    id: 'quakes-point',
                    type: 'circle',
                    source: 'quakes',
                    paint: {
                        'circle-radius': ['interpolate', ['linear'], ['get', 'mag'], 2, 3, 7, 12],
                        'circle-color': ['interpolate', ['linear'], ['get', 'mag'], 2, '#00ff00', 4, '#ffff00', 6, '#ff0000'],
                        'circle-stroke-width': 1,
                        'circle-stroke-color': '#fff'
                    }
                });
            }
        } catch (err) {
            console.error("Veri senkronizasyon hatası:", err);
        }
    }

    map.on('load', () => {
        updateQuakes();
        rotateGlobe();
        setInterval(updateQuakes, 60000); // 1 dakikada bir veri güncelleme
    });

    // Bilgi Penceresi (Popup)
    map.on('click', 'quakes-point', (e) => {
        const p = e.features[0].properties;
        new mapboxgl.Popup({ closeButton: false, className: 'quake-popup' })
            .setLngLat(e.lngLat)
            .setHTML(`
                <div style="font-family: sans-serif; padding: 5px;">
                    <strong style="font-size: 14px; color: #e67e22;">${p.mag} ML</strong><br>
                    <span style="font-size: 12px; font-weight: bold;">${p.place}</span><br>
                    <span style="font-size: 11px; color: #666;">${p.date}</span><br>
                    <span style="font-size: 11px; color: #666;">Derinlik: ${p.depth} km</span>
                </div>
            `)
            .addTo(map);
    });

    map.on('mouseenter', 'quakes-point', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'quakes-point', () => map.getCanvas().style.cursor = '');

</script>
</body>
</html>

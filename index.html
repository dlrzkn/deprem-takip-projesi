<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sismik İzleme Platformu</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Haritanın tam ekran olmasını garanti altına alalım */
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Pop-up'ların görünürlüğünü CSS ile güçlendirelim */
        .mapboxgl-popup { z-index: 9999; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <button id="spin-btn" class="filter-btn btn-active">Otomatik Dönüş: AÇIK</button>
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <button class="filter-btn btn-active" onclick="filterMag(0, this)">Hepsi</button>
            <button class="filter-btn" onclick="filterMag(4.5, this)">M 4.5+</button>
            <button class="filter-btn" onclick="filterMag(6.0, this)">M 6.0+</button>
        </div>
    </div>

    <div class="legend">
        <h4>Büyüklük (Mw)</h4>
        <div><span style="background: #2ecc71;"></span> &lt; 3.0 Mikro</div>
        <div><span style="background: #f1c40f;"></span> 3.0 - 4.9 Küçük</div>
        <div><span style="background: #e67e22;"></span> 5.0 - 5.9 Orta</div>
        <div><span style="background: #d35400;"></span> 6.0 - 6.9 Güçlü</div>
        <div><span style="background: #e74c3c;"></span> 7.0 - 7.9 Büyük</div>
        <div><span style="background: #8e44ad;"></span> &gt; 8.0 Mega</div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 8px 0;">
        <div style="font-size: 10px; opacity: 0.6;">Kaynak: USGS / NEIC</div>
    </div>
    
<div class="time-filters" style="margin-top: 10px; display: flex; gap: 5px;">
    <button class="filter-btn" onclick="changeTimeRange('hour', this)">Son 1 Saat</button>
    <button class="filter-btn btn-active" onclick="changeTimeRange('day', this)">Son 1 Gün</button>
    <button class="filter-btn" onclick="changeTimeRange('week', this)">Son 1 Hafta</button>
</div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    
    <script src="script.js"></script>
</body>
</html>

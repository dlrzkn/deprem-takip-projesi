<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SeismoPro | Gelişmiş Jeofizik Analiz Platformu</title>
    
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css' rel='stylesheet' />
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js'></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode"> <header class="top-bar">
        <div class="brand">
            <div class="pulse-dot"></div> <h1>SEISMO<span>PRO</span></h1>
        </div>
        <div id="live-stats" class="global-stats">
            <div class="stat-item">
                <span id="energy-label" class="label">SON 24S ENERJİ SALINIMI:</span>
                <span id="total-energy" class="value">Hesaplanıyor...</span>
            </div>
        </div>
        <div class="system-time" id="clock">00:00:00</div>
    </header>

    <main class="app-container">
        <section id="map"></section>

        <aside class="sidebar control-sidebar">
            <div class="glass-card main-controls">
                <h3>Analiz Filtreleri</h3>
                
                <div class="filter-section">
                    <label>Minimum Büyüklük (M<sub>w</sub>)</label>
                    <div class="range-slider">
                        <input type="range" id="mag-range" min="0" max="9" step="0.5" value="0">
                        <span id="mag-value">0+</span>
                    </div>
                </div>

                <div class="filter-section">
                    <label>Zaman Aralığı</label>
                    <div class="btn-group-grid">
                        <button class="filter-btn" data-time="hour">1 Saat</button>
                        <button class="filter-btn active" data-time="day">24 Saat</button>
                        <button class="filter-btn" data-time="week">7 Gün</button>
                    </div>
                </div>

                <div class="filter-section">
                    <label>Odak Derinliği (km)</label>
                    <div class="btn-group-grid">
                        <button class="filter-btn active" data-depth="all">Tümü</button>
                        <button class="filter-btn" data-depth="shallow">Sığ (<70)</button>
                        <button class="filter-btn" data-depth="deep">Derin (>70)</button>
                    </div>
                </div>

                <div class="filter-section system-actions">
                    <button id="theme-toggle" class="action-btn">🌓 Gündüz Modu</button>
                    <button id="rotation-toggle" class="action-btn active">🌎 Rotasyon: AÇIK</button>
                </div>

                <div class="layer-toggle">
                    <label class="switch-container">
                        <input type="checkbox" id="plate-boundaries" checked>
                        <span class="slider"></span>
                        <span class="label-text">Levha Sınırları (Tektonik)</span>
                    </label>
                </div>
            </div>

            <div class="glass-card stats-card">
                <h3>Derinlik Dağılımı</h3>
                <canvas id="depth-chart" height="100"></canvas>
            </div>
        </aside>

        <aside class="sidebar feed-sidebar">
           <div class="list-header">
    <span id="event-count">Veriler Alınıyor...</span>
    <button id="sort-btn" class="action-btn mini">
        <span class="btn-icon">⇅</span>
        <span class="btn-text">Büyüklüğe Göre</span>
    </button>
</div>

            <div id="earthquake-feed" class="feed-container">
                </div>
        </aside>
    </main>

    <footer class="bottom-info">
        <div class="source-indicators">
            <span class="src"><i class="dot usgs"></i> USGS</span>
            <span class="src"><i class="dot emsc"></i> EMSC</span>
            <span class="src"><i class="dot gfz"></i> GFZ</span>
        </div>
        <div id="connection-status">Sistem Kontrol Ediliyor...</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

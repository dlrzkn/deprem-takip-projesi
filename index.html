<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sismik İzleme Platformu | Pro</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div class="top-bar glass-effect">
        <div class="live-indicator"><span class="dot"></span> CANLI VERİ</div>
        <div id="last-update">--:--:--</div>
    </div>
    
    <button id="rotation-btn" class="glass-effect corner-btn tl" onclick="toggleRotation()">🌎 Durdur</button>

    <button id="theme-toggle" class="glass-effect corner-btn tr" onclick="toggleTheme()">🌓</button>

    <div id="legend" class="legend-box glass-effect">
        <div class="label" style="margin-bottom:10px;">Büyüklük Ölçeği (Mw)</div>
        <div class="l-item"><span style="background:#2ecc71"></span> <b>&lt; 3.0</b> Mikro</div>
        <div class="l-item"><span style="background:#f1c40f"></span> <b>3.0 - 4.9</b> Küçük</div>
        <div class="l-item"><span style="background:#e67e22"></span> <b>5.0 - 5.9</b> Orta</div>
        <div class="l-item"><span style="background:#e74c3c"></span> <b>6.0 - 6.9</b> Güçlü</div>
        <div class="l-item"><span style="background:#c0392b"></span> <b>7.0 - 7.9</b> Büyük</div>
    </div>

    <div id="earthquake-list-container" class="glass-effect">
        <div class="list-header">
            <span>⚠️ Son Aktivite</span>
            <small id="list-count">0 Deprem</small>
        </div>
        <div id="earthquake-list" class="style-scroll"></div>
    </div>

    <div class="bottom-panel glass-effect">
        <div class="filter-group">
            <span class="label">Magnitüd (Mw)</span>
            <div class="btn-row">
                <button class="mag-btn btn-active" onclick="changeMag(0)">Hepsi</button>
                <button class="mag-btn" onclick="changeMag(4.5)">4.5+</button>
                <button class="mag-btn" onclick="changeMag(6.0)">6.0+</button>
            </div>
        </div>
        <div class="filter-group">
            <span class="label">Zaman Aralığı</span>
            <div class="btn-row">
                <button class="time-btn" onclick="changeTime('hour')">1S</button>
                <button class="time-btn btn-active" onclick="changeTime('day')">24S</button>
                <button class="time-btn" onclick="changeTime('week')">7G</button>
            </div>
        </div>
    </div>

    <button id="legend-btn" class="glass-effect corner-btn br" onclick="toggleLegend()">💡</button>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <p>SİSMİK VERİLER YÜKLENİYOR</p>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
    <script src="script.js"></script>
</body>
</html>
